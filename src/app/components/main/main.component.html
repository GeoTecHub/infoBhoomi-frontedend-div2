<!-- Verifying authentication and get user details -->
<app-user-authenticator></app-user-authenticator>

<div class="main-content">
  <div class="header-container">
    <app-header></app-header>
  </div>

  <div class="main-body">
    <div class="side-panel-wrapper">
      <div
        class="side-panel-container"
        [class.collapsed]="isSidebarClosed"
        [style.width.px]="isSidebarClosed ? 12 : panelWidth"
      >
        <app-side-panel
          (emitExtend)="onExtendChanged($event)"
          (resizeWidth)="onPanelResized($event)"
        ></app-side-panel>
      </div>
      <button
        class="sidebar-toggle-btn"
        (click)="toggleSidebar()"
        [attr.aria-label]="isSidebarClosed ? 'Open sidebar' : 'Close sidebar'"
      >
        <mat-icon>{{ isSidebarClosed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>

    <!-- Map rendering target - MUST have position: relative -->
    <div #mapContainer class="map-container">
      <!-- Add to the map container -->

      <!-- OpenLayers renders its canvas etc. directly inside here -->

      <!-- === Tools Container (Top Right) === -->
      <div class="map-tools-container">
        <app-tools></app-tools>
      </div>

      <!-- === Bottom Controls Container (Bottom Right) === -->
      <div class="map-bottom-controls">
        <!-- Projection Selector -->
        <select
          class="projection-select"
          title="Select Coordinate Display Projection"
          [(ngModel)]="selectedDisplayProjection"
          (change)="onDisplayProjectionChange()"
        >
          @for (proj of availableProjections; track proj) {
            <option [value]="proj">
              {{ proj }}
            </option>
          }
        </select>
        <!-- Mouse Position -->
        <div #mousePositionElement class="mouse-position"></div>
      </div>

      <!-- === Loading Indicator (Center) === -->
      @if (layerService.isLoading$ | async) {
        <div class="map-loading-indicator">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
      }
    </div>

    <small class="copyright-text w-100"> &copy; 2025 Infobhoomi. All Rights Reserved. </small>

    <!-- context menu -->
    @if (contextMenuVisible) {
      <div
        class="map-context-menu"
        [ngStyle]="{
          top: contextMenuPosition.y + 'px',
          left: contextMenuPosition.x + 'px',
        }"
      >
        <div class="context-menu-list" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
          @if (selectedFeatureInfo?.layerId !== 3) {
            <button class="context-menu-item" (click)="onAddBuilding()">Add Building</button>
          }
          @if (selectedFeatureInfo?.layerId !== 3) {
            <button class="context-menu-item" (click)="onConvertToBuilding()">Convert to building</button>
          }
          <button class="context-menu-item" (click)="onAddLegalForms()">Add Legal Forms</button>
          @if (user?.user_type === 'admin' || user?.user_type === 'super_admin') {
            <button class="context-menu-item" (click)="onClickInfo()">Feature Info</button>
          }
        </div>
      </div>
    }
  </div>
</div>
